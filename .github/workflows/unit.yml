name: Unit

on:
  pull_request:
    branches: [master]

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run vitest unit tests
        run: npx vitest run

  plumbing:
    runs-on: gpu-nvidia-t4
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install chromium

      - name: Run dispose tests
        run: xvfb-run --auto-servernum npx playwright test tests/plumbing/dispose.spec.ts

      - name: Run material-swap tests
        run: xvfb-run --auto-servernum npx playwright test tests/plumbing/material-swap.spec.ts

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plumbing-results
          path: test-results/
          retention-days: 7
