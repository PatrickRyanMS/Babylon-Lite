<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Babylon Lite — Scene 231: Standard Material Features</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #1f1f24;
            }
            /* Fills the window for interactive viewing (default). The parity spec passes
               ?capture=1, which locks the canvas to 600x400 for the deterministic golden. */
            #renderCanvas {
                width: 100vw;
                height: 100vh;
                display: block;
            }
        </style>
    </head>
    <body>
        <canvas id="renderCanvas" width="600" height="400"></canvas>
        <script type="module" src="/lite/src/lite/scene231.ts"></script>
    </body>
</html>
