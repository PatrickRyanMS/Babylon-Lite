<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Babylon Lite — FBX Test</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <select id="modelPicker" style="position:fixed;top:10px;left:10px;z-index:10;font:13px sans-serif;padding:4px 6px;background:#1e1e2e;color:#eee;border:1px solid #555;border-radius:4px;">
    <optgroup label="Geometry / Materials / Textures">
      <option value="m01_cube_phong">m01 — cube (phong)</option>
      <option value="m02_geo_ngons">m02 — n-gons</option>
      <option value="m03_normals">m03 — normals (flat/smooth)</option>
      <option value="m04_material_properties">m04 — material properties</option>
      <option value="m05_textures">m05 — textures (embedded+external)</option>
      <option value="m06_uv_transform">m06 — uv transform</option>
      <option value="m07_multimaterial">m07 — multi-material</option>
      <option value="m08_transforms">m08 — transforms</option>
    </optgroup>
    <optgroup label="Cameras / Lights / Axis">
      <option value="m15_camera_lights">m15 — cameras + lights</option>
      <option value="m16_axis_yup">m16 — axis Y-up</option>
      <option value="m16_axis_zup">m16 — axis Z-up</option>
      <option value="m16_units_254">m16 — units (2.54)</option>
    </optgroup>
    <optgroup label="Skinning / Morph / Animation (deformation needs the shelved Standard engine patch)">
      <option value="m09_skinning">m09 — skinning (bind pose)</option>
      <option value="m10_morph">m10 — morph (use &amp;morph=1)</option>
      <option value="m11_node_anim">m11 — node animation</option>
      <option value="m12_skeletal_anim">m12 — skeletal animation</option>
      <option value="m13_morph_anim">m13 — morph animation</option>
      <option value="m14_multiclip">m14 — multi-clip</option>
    </optgroup>
  </select>
  <script>
    (function () {
      var sel = document.getElementById("modelPicker");
      var p = new URLSearchParams(location.search);
      var cur = p.get("model") || "m01_cube_phong";
      for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { sel.selectedIndex = i; } }
      sel.addEventListener("change", function () {
        var q = new URLSearchParams(location.search);
        q.set("model", sel.value);
        location.search = q.toString();
      });
    })();
  </script>
  <script type="module" src="/lite/src/fbx-test.ts"></script>
</body>
</html>
