<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Babylon Lite — Demo: Platformer</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #6aa0f5;
            }
            canvas {
                width: 100%;
                height: 100%;
                display: block;
                touch-action: none;
                image-rendering: pixelated;
            }
            .loading-overlay {
                position: fixed;
                inset: 0;
                z-index: 10000;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1d2a44;
                color: #eaf2fb;
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                transition: opacity 0.5s ease;
            }
            .loading-overlay.is-hidden {
                opacity: 0;
                pointer-events: none;
            }
            .loading-box {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                text-align: center;
                padding: 0 1rem;
            }
            .loading-spinner {
                width: 54px;
                height: 54px;
                border-radius: 50%;
                border: 4px solid rgba(120, 175, 235, 0.25);
                border-top-color: #6fb0ff;
                animation: lite-spin 0.9s linear infinite;
            }
            .loading-label {
                font-size: 1.05rem;
                font-weight: 600;
            }
            .loading-sub {
                font-size: 0.8rem;
                color: #9fb6d0;
            }
            .loading-size {
                font-size: 0.78rem;
                color: #9fb6d0;
                margin-top: 0.4rem;
                min-height: 1em;
                letter-spacing: 0.01em;
            }
            @keyframes lite-spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @media (prefers-reduced-motion: reduce) {
                .loading-spinner {
                    animation-duration: 2.4s;
                }
            }
            .hint {
                position: fixed;
                left: 12px;
                bottom: 12px;
                z-index: 50;
                padding: 6px 10px;
                border-radius: 6px;
                background: rgba(14, 33, 56, 0.72);
                color: #cfe0f5;
                font:
                    12px system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                pointer-events: none;
                user-select: none;
            }
        </style>
    </head>
    <body>
        <!--
    This page loads the production-BUNDLED demo (tree-shaken + minified) from
    /lite/bundle/demos/, NOT the raw TypeScript source. Run `pnpm build:bundle-demo
    platformer` (fast, this demo only) or `pnpm build:bundle-demos` (all demos; also
    part of `pnpm dev:lab`) to (re)generate the bundle this page references.

    Assets are a committed CC0 subset of Kenney's Platformer Art Deluxe pack under
    lab/public/platformer/ — no runtime fetch required.
  -->
        <canvas id="renderCanvas"></canvas>
        <div class="hint">← → move · Z / Space jump · ↓ duck · X / Shift run / shoot · P pause · C CRT</div>
        <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite">
            <div class="loading-box">
                <div class="loading-spinner" aria-hidden="true"></div>
                <div class="loading-label">Loading level…</div>
                <div class="loading-sub">Preparing World 1-1.</div>
                <div class="loading-size" aria-hidden="true"></div>
            </div>
        </div>
        <script>
            (function () {
                var overlay = document.getElementById("loadingOverlay");
                var canvas = document.getElementById("renderCanvas");
                if (!overlay || !canvas) return;
                var size = overlay.querySelector(".loading-size");
                var done = false;
                function syncSize() {
                    var sz = canvas.dataset.loadingSize;
                    if (sz !== undefined && sz !== "" && size) size.textContent = sz;
                }
                function hide() {
                    if (done) return;
                    done = true;
                    overlay.classList.add("is-hidden");
                    setTimeout(function () {
                        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
                    }, 600);
                }
                function check() {
                    if (canvas.dataset.ready === "true" || canvas.dataset.error) {
                        hide();
                        return true;
                    }
                    return false;
                }
                syncSize();
                if (!check()) {
                    new MutationObserver(function () {
                        syncSize();
                        check();
                    }).observe(canvas, { attributes: true, attributeFilter: ["data-ready", "data-error", "data-loading-size"] });
                    setTimeout(hide, 45000);
                }
            })();
        </script>
        <script type="module" src="/lite/bundle/demos/platformer.js"></script>
    </body>
</html>
